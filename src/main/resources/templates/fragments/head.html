<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title, keywords, description)">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimal-ui">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title th:text="${title} ? ${title} + ' | NorthPark' : 'NorthPark'"></title>
    <meta name="keywords" th:content="${keywords} ?: 'NorthPark, 影视, 软件, 课程'">
    <meta name="description" th:content="${description} ?: 'NorthPark Modern Rebuild'">
    <link rel="shortcut icon" href="/static/img/favicon.ico">
    <!-- Tailwind CSS 4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Quill.js 富文本编辑器 CSS -->
    <link th:if="${loadEditor}" href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Noto+Sans+SC:wght@400;500;700&amp;display=swap');

        :root {
            --primary: 234 179 8;
        }

        /* Quill toolbar 和 container 的融合 */
        .ql-toolbar.ql-snow {
            border: 1px solid #e5e7eb !important;
            border-bottom: none !important;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            background-color: #f9fafb;
            padding: 8px 12px !important;
            transition: all 0.2s;
        }

        .ql-container.ql-snow {
            border: 1px solid #e5e7eb !important;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            background-color: #fff;
            font-size: 15px;
            font-family: 'Noto Sans SC', 'Inter', system-ui, sans-serif;
            transition: all 0.2s;
        }

        .ql-container.ql-snow:focus-within {
            border-color: #3b82f6 !important;
        }

        /* 解决大黑横杠（.ql-separator） */
        .ql-snow .ql-toolbar .ql-separator {
            width: 1px;
            height: 18px;
            margin: 0 8px;
            background: #e5e7eb;
            border: none !important;
            vertical-align: middle;
            display: inline-block;
        }

        /* SVG 箭头（上下箭头）布局修复 - 覆盖 Tailwind reset */
        .ql-snow svg {
            display: inline !important;
            width: 16px !important;
            height: 16px !important;
            float: right;
            vertical-align: middle;
            margin-top: 2px;
        }
        
        .ql-snow .ql-picker-label svg {
            float: right;
            margin-top: 3px;
        }

        /* Picker 下拉框样式 */
        .ql-snow .ql-picker-options {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border-radius: 6px;
            padding: 4px 0;
            z-index: 1000;
        }

        .ql-snow .ql-picker.ql-expanded .ql-picker-options {
            display: block;
        }

        /* Toolbar 按钮统一样式 */
        .ql-snow .ql-toolbar button {
            padding: 4px 6px;
            border-radius: 4px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .ql-snow .ql-toolbar button:hover,
        .ql-snow .ql-toolbar button.ql-active {
            background-color: #fefce8;
            border-color: #fde047;
        }

        /* 移除 Tailwind preflight 对 Quill 的干扰 */
        .ql-editor h1, .ql-editor h2, .ql-editor h3 {
            font-weight: 700;
            margin-top: 1.25em;
            margin-bottom: 0.75em;
        }

        .ql-editor p {
            margin-bottom: 1.25em;
            line-height: 1.7;
        }

        .ql-editor ul, .ql-editor ol {
            margin-bottom: 1.25em;
            padding-left: 1.5em;
        }

        /* 图片/视频在编辑器内的基础样式 */
        .ql-editor img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 1em 0;
        }

        /* 源码视图友好样式 */
        .ql-snow .ql-editor pre.ql-syntax {
            background: #1f2937;
            color: #e5e7eb;
            padding: 16px;
            border-radius: 8px;
            font-size: 13px;
            overflow-x: auto;
        }

        /* 移动端适配 */
        @media (max-width: 640px) {
            .ql-toolbar.ql-snow {
                padding: 8px 4px;
            }
            .ql-snow .ql-toolbar button {
                padding: 4px 6px;
            }
        }
    </style>
</head>
<body>
</body>
</html>
