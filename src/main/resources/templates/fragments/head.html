<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title, keywords, description)">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimal-ui">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title th:text="${title} ? ${title} + ' | NorthPark' : 'NorthPark'"></title>
    <meta name="keywords" th:content="${keywords} ?: 'NorthPark, 影视, 软件, 课程'">
    <meta name="description" th:content="${description} ?: 'NorthPark Modern Rebuild'">
    <link rel="shortcut icon" href="/static/img/favicon.ico">
    <!-- Tailwind CSS 4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Noto+Sans+SC:wght@400;500;700&amp;display=swap');

        :root {
            --primary: 234 179 8;
        }
        
        button, [type='button'], [type='reset'], [type='submit'] {
            cursor: pointer;
        }
    </style>
</head>
<body>
</body>
</html>
