<header th:fragment="nav" 
        class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200"
        x-data="{ mobileMenuOpen: false }">
    <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center space-x-8">
                <div class="flex-shrink-0 flex items-center">
                    <a href="/" class="text-xl font-semibold tracking-tight text-gray-900 ">NorthPark</a>
                </div>
                <!-- Desktop Menu -->
                <div class="hidden sm:flex sm:space-x-8">
                    <a href="/" class="inline-flex items-center px-1 pt-1 text-sm font-medium border-b-2 transition-colors duration-200" 
                       th:classappend="${session.tabs == 'index'} ? 'border-blue-500 text-gray-900' : 'border-transparent text-gray-500 hover:text-gray-900 hover:border-gray-300'">首页</a>
                    <a href="/movies" class="inline-flex items-center px-1 pt-1 text-sm font-medium border-b-2 transition-colors duration-200" 
                       th:classappend="${session.tabs == 'movies'} ? 'border-blue-500 text-gray-900' : 'border-transparent text-gray-500 hover:text-gray-900 hover:border-gray-300'">影视</a>
                    <a href="/soft/mac" class="inline-flex items-center px-1 pt-1 text-sm font-medium border-b-2 transition-colors duration-200" 
                       th:classappend="${session.tabs == 'soft'} ? 'border-blue-500 text-gray-900' : 'border-transparent text-gray-500 hover:text-gray-900 hover:border-gray-300'">软件</a>
                    <a href="/learning" class="inline-flex items-center px-1 pt-1 text-sm font-medium border-b-2 transition-colors duration-200" 
                       th:classappend="${session.tabs == 'learning'} ? 'border-blue-500 text-gray-900' : 'border-transparent text-gray-500 hover:text-gray-900 hover:border-gray-300'">课程</a>
                </div>
            </div>
            
            <div class="flex items-center">
                <!-- User Auth (Desktop) -->
                <div class="hidden sm:flex items-center space-x-4" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
                    <th:block sec:authorize="isAuthenticated()">
                    <span class="text-sm text-gray-600 font-medium" sec:authentication="name">用户</span>
                    <a href="/notifications" class="relative text-gray-500 hover:text-gray-900 transition-colors" title="消息通知">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                        </svg>
                        <span id="nav-notify-count" class="absolute -top-1.5 -right-1.5 bg-red-500 text-white rounded-full text-[9px] font-bold min-w-[16px] h-4 flex items-center justify-center px-1 leading-none hidden">0</span>
                    </a>
                    <a href="/logout" class="text-xs font-semibold text-gray-500 hover:text-red-600 transition-colors uppercase tracking-wider">退出</a>
                    </th:block>
                    <th:block sec:authorize="!isAuthenticated()">
                        <a href="/login" class="text-sm font-semibold text-blue-600 hover:text-blue-700 transition-colors uppercase tracking-wider">登录</a>
                    </th:block>
                </div>

                <!-- Mobile menu button -->
                <div class="flex items-center sm:hidden">
                    <button @click="mobileMenuOpen = !mobileMenuOpen" type="button" class="inline-flex items-center justify-center p-2 rounded-xl text-gray-500 hover:text-gray-900 hover:bg-gray-100 focus:outline-none transition-all duration-200">
                        <svg class="h-6 w-6" :class="{'hidden': mobileMenuOpen, 'block': !mobileMenuOpen }" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                        <svg class="h-6 w-6" :class="{'block': mobileMenuOpen, 'hidden': !mobileMenuOpen }" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Mobile Menu Content -->
    <div x-show="mobileMenuOpen" 
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 -translate-y-2"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 -translate-y-2"
         class="sm:hidden bg-white border-b border-gray-100 shadow-xl overflow-hidden" 
         id="mobile-menu" 
         style="display: none;">
        <div class="px-4 pt-2 pb-6 space-y-1">
            <a href="/" class="block px-4 py-3 rounded-2xl text-base font-medium transition-colors"
               th:classappend="${session.tabs == 'index'} ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'">首页</a>
            <a href="/movies" class="block px-4 py-3 rounded-2xl text-base font-medium transition-colors"
               th:classappend="${session.tabs == 'movies'} ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'">影视</a>
            <a href="/soft/mac" class="block px-4 py-3 rounded-2xl text-base font-medium transition-colors"
               th:classappend="${session.tabs == 'soft'} ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'">软件</a>
            <a href="/learning" class="block px-4 py-3 rounded-2xl text-base font-medium transition-colors"
               th:classappend="${session.tabs == 'learning'} ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'">课程</a>
            
            <div class="pt-4 mt-4 border-t border-gray-100 flex flex-col space-y-3 px-4" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
                <th:block sec:authorize="isAuthenticated()">
                    <div class="flex items-center justify-between">
                        <span class="text-sm font-medium text-gray-900" sec:authentication="name">用户</span>
                        <a href="/logout" class="text-sm font-semibold text-red-500 uppercase tracking-wider">退出</a>
                    </div>
                    <a href="/notifications" class="flex items-center justify-between text-sm text-gray-600 hover:text-gray-900">
                        <span>消息通知</span>
                        <span id="mobile-nav-notify-count" class="bg-red-500 text-white rounded-full text-3xs px-1.5 py-0.5 hidden">0</span>
                    </a>
                </th:block>
                <th:block sec:authorize="!isAuthenticated()">
                    <a href="/login" class="w-full text-center py-3 bg-blue-600 text-white rounded-2xl font-semibold shadow-lg shadow-blue-500/20">登录</a>
                </th:block>
            </div>
        </div>
    </div>
    <script sec:authorize="isAuthenticated()">
        (function() {
            function updateNotifyCount() {
                fetch('/notify/count')
                    .then(r => r.json())
                    .then(d => {
                        if(d.result && d.data > 0) {
                            var desktopBadge = document.getElementById('nav-notify-count');
                            var mobileBadge = document.getElementById('mobile-nav-notify-count');
                            var displayText = d.data > 99 ? '99+' : d.data;
                            if(desktopBadge) {
                                desktopBadge.innerText = displayText;
                                desktopBadge.classList.remove('hidden');
                            }
                            if(mobileBadge) {
                                mobileBadge.innerText = displayText;
                                mobileBadge.classList.remove('hidden');
                            }
                        }
                    })
                    .catch(() => {});
            }
            updateNotifyCount();
        })();
    </script>
</header>
