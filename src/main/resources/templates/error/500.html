<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('系统出错了', null, null)">
</head>
<body class="flex flex-col min-h-screen bg-gray-50">
    <header th:replace="fragments/nav :: nav"></header>

    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-3xl border border-gray-100 shadow-sm text-center">
            <div class="space-y-4">
                <div class="flex justify-center">
                    <div class="bg-amber-50 p-4 rounded-full">
                        <svg class="w-16 h-16 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                        </svg>
                    </div>
                </div>
                <h1 class="text-7xl font-extrabold text-gray-900 tracking-tight">500</h1>
                <h2 class="text-xl font-bold text-gray-800">火星救援！系统出错了</h2>
                <p class="text-sm text-gray-500 max-w-xs mx-auto" th:text="${message} ?: '服务器开小差了，请稍后再试。'">
                    服务器开小差了，请稍后再试。
                </p>
            </div>
            
            <div class="pt-4 flex flex-col sm:flex-row justify-center gap-4">
                <a href="/" 
                   class="inline-flex justify-center items-center px-6 py-3 border border-transparent text-sm font-semibold rounded-xl text-white bg-blue-600 hover:bg-blue-700 transition-colors shadow-sm">
                    返回首页
                </a>
                <button onclick="history.back()" 
                        class="inline-flex justify-center items-center px-6 py-3 border border-gray-200 text-sm font-semibold rounded-xl text-gray-600 hover:bg-gray-50 transition-colors">
                    返回上一页
                </button>
            </div>
        </div>
    </main>

    <footer th:replace="fragments/footer :: footer"></footer>
</body>
</html>
