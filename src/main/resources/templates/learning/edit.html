<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="fragments/head :: head('编辑学习', null, null)">
</head>
<body class="flex flex-col min-h-screen bg-gray-50">
    <header th:replace="fragments/nav :: nav"></header>

    <main class="flex-grow max-w-3xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="bg-white rounded-3xl border border-gray-100 shadow-sm p-8 md:p-12">
            <header class="border-b border-gray-100 pb-6 mb-8">
                <h1 class="text-2xl font-bold text-gray-900 flex items-center gap-2">
                    <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                    </svg>
                    编辑学习资源
                </h1>
            </header>

            <form id="editItemForm" class="space-y-6">
                <input type="hidden" name="id" th:value="${model.id}">

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">课程/书籍名称</label>
                    <input type="text" name="title" th:value="${model.title}" required
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">下载地址</label>
                    <div style="border: 1px solid #e5e7eb; border-radius: 12px;">
                        <div id="toolbar_path" style="border-bottom: 1px solid #e5e7eb;"></div>
                        <div id="editor_path" style="min-height: 150px;"></div>
                    </div>
                    <textarea id="path_hidden" name="path" class="hidden" th:utext="${model.path}"></textarea>
                    <textarea id="path_source" style="width: 100%; margin-top: 10px; padding: 8px; height: 100px; font-family: monospace; font-size: 12px; border: 1px solid #e5e7eb; border-radius: 8px;"></textarea>
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">学习颜色</label>
                        <input type="text" name="color" th:value="${model.color}" required
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">学习定价 (积分/点数)</label>
                        <input type="number" name="price" th:value="${model.price}" required
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">置顶指数</label>
                        <input type="number" name="hotIndex" th:value="${model.hotIndex}" required
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">学习标签 (中文 tags)</label>
                        <input type="text" name="tags" th:value="${model.tags}" required
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">学习标签 (英文 tagsCode)</label>
                        <input type="text" name="tagsCode" th:value="${model.tagsCode}" required
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">学习预览 (brief)</label>
                    <div style="border: 1px solid #e5e7eb; border-radius: 12px;">
                        <div id="toolbar_brief" style="border-bottom: 1px solid #e5e7eb;"></div>
                        <div id="editor_brief" style="min-height: 150px;"></div>
                    </div>
                    <textarea id="brief_hidden" name="brief" class="hidden" th:utext="${model.brief}"></textarea>
                    <textarea id="brief_source" style="width: 100%; margin-top: 10px; padding: 8px; height: 100px; font-family: monospace; font-size: 12px; border: 1px solid #e5e7eb; border-radius: 8px;"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">学习内容/详情</label>
                    <div style="border: 1px solid #e5e7eb; border-radius: 12px;">
                        <div id="toolbar_content" style="border-bottom: 1px solid #e5e7eb;"></div>
                        <div id="editor_content" style="min-height: 250px;"></div>
                    </div>
                    <textarea id="content_hidden" name="content" class="hidden" th:utext="${model.content}"></textarea>
                    <textarea id="content_source" style="width: 100%; margin-top: 10px; padding: 8px; height: 150px; font-family: monospace; font-size: 12px; border: 1px solid #e5e7eb; border-radius: 8px;"></textarea>
                </div>

                <div class="pt-6 border-t border-gray-100 flex justify-end gap-4">
                    <a th:href="@{'/learning/post-' + ${model.id} + '.html'}"
                       class="px-6 py-3 rounded-xl border border-gray-200 text-sm font-semibold text-gray-600 hover:bg-gray-50 transition-colors">
                        取消
                    </a>
                    <button type="button" id="submitBtn"
                            class="px-6 py-3 rounded-xl bg-blue-600 text-sm font-semibold text-white hover:bg-blue-700 transition-colors shadow-sm">
                        保存修改
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer th:replace="fragments/footer :: footer"></footer>

    <!-- wangEditor 富文本编辑器 -->
    <link href="https://unpkg.com/@wangeditor/editor@latest/dist/css/style.css" rel="stylesheet">
    <script src="https://unpkg.com/@wangeditor/editor@latest/dist/index.js"></script>
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function () {
            const E = window.wangEditor;

            function cleanHtml(html) {
                if (!html) return '';
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;
                return tempDiv.innerHTML;
            }

            const pathValue = cleanHtml(document.getElementById('path_hidden').value);
            const briefValue = cleanHtml(document.getElementById('brief_hidden').value);
            const contentValue = cleanHtml(document.getElementById('content_hidden').value);

            // 初始化下载地址编辑器
            const editorPath = E.createEditor({
                selector: '#editor_path',
                html: pathValue,
                config: {
                    placeholder: '请输入内容...',
                    onChange(editor) {
                        const html = editor.getHtml();
                        document.getElementById('path_source').value = html;
                    }
                }
            });
            E.createToolbar({
                editor: editorPath,
                selector: '#toolbar_path',
                config: {}
            });
            document.getElementById('path_source').value = pathValue;

            // 初始化简介编辑器
            const editorBrief = E.createEditor({
                selector: '#editor_brief',
                html: briefValue,
                config: {
                    placeholder: '请输入内容...',
                    onChange(editor) {
                        const html = editor.getHtml();
                        document.getElementById('brief_source').value = html;
                    }
                }
            });
            E.createToolbar({
                editor: editorBrief,
                selector: '#toolbar_brief',
                config: {}
            });
            document.getElementById('brief_source').value = briefValue;

            // 初始化内容编辑器
            const editorContent = E.createEditor({
                selector: '#editor_content',
                html: contentValue,
                config: {
                    placeholder: '请输入内容...',
                    onChange(editor) {
                        const html = editor.getHtml();
                        document.getElementById('content_source').value = html;
                    }
                }
            });
            E.createToolbar({
                editor: editorContent,
                selector: '#toolbar_content',
                config: {}
            });
            document.getElementById('content_source').value = contentValue;

            // 源码框编辑时同步到编辑器（鼠标移出后触发）
            document.getElementById('path_source').addEventListener('blur', function() {
                editorPath.setHtml(this.value);
            });
            document.getElementById('brief_source').addEventListener('blur', function() {
                editorBrief.setHtml(this.value);
            });
            document.getElementById('content_source').addEventListener('blur', function() {
                editorContent.setHtml(this.value);
            });

            document.getElementById('submitBtn').addEventListener('click', function () {
                document.getElementById('path_hidden').value = editorPath.getHtml();
                document.getElementById('brief_hidden').value = editorBrief.getHtml();
                document.getElementById('content_hidden').value = editorContent.getHtml();

                const form = document.getElementById('editItemForm');
                const formData = new FormData(form);

                fetch('/learning/addItem', {
                    method: 'POST',
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    if (data.result) {
                        Swal.fire({
                            icon: 'success',
                            title: '成功',
                            text: '保存学习资源成功',
                            confirmButtonText: '确定'
                        }).then(() => {
                            window.location.href = '/learning/post-' + [[${model.id}]] + '.html';
                        });
                    } else {
                        Swal.fire({
                            icon: 'error',
                            title: '错误',
                            text: data.message || '操作失败，请重试'
                        });
                    }
                })
                .catch(err => {
                    Swal.fire({
                        icon: 'error',
                        title: '网络错误',
                        text: '操作失败，请检查网络后重试'
                    });
                });
            });
        });
    </script>
</body>
</html>
