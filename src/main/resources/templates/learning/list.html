<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('课程/书籍列表', null, null)"></head>
<body class="flex flex-col min-h-screen">
    <header th:replace="fragments/nav :: nav"></header>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- Main Content List -->
            <div class="lg:col-span-3">
                <div class="mb-6 flex justify-between items-center">
                    <h1 class="text-2xl font-bold tracking-tight text-gray-900">
                        <span th:if="${selTag != null}" th:text="'标签: ' + ${selTag}">标签检索</span>
                        <span th:if="${selTag == null}">课程与书籍</span>
                    </h1>
                    <div class="flex space-x-2">
                        <a th:href="@{/learning(orderBy='latest', keyword=${keyword})}" 
                           class="px-3 py-1.5 text-xs font-medium rounded-full"
                           th:classappend="${orderBy == 'latest'} ? 'bg-gray-900 text-white' : 'bg-white border border-gray-300 text-gray-700 hover:bg-gray-50'">最新</a>
                        <a th:href="@{/learning(orderBy='hot', keyword=${keyword})}" 
                           class="px-3 py-1.5 text-xs font-medium rounded-full"
                           th:classappend="${orderBy == 'hot'} ? 'bg-gray-900 text-white' : 'bg-white border border-gray-300 text-gray-700 hover:bg-gray-50'">最热</a>
                    </div>
                </div>

                <!-- Grid List -->
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                    <div th:each="item : ${list}" class="bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm hover:shadow-md transition-all duration-300 flex flex-col justify-between">
                        <!-- Cover Image / Default Image -->
                        <div class="relative aspect-[16/10] w-full bg-gray-50 overflow-hidden border-b border-gray-50 flex items-center justify-center">
                            <img th:if="${item.briefImg != null && !item.briefImg.isEmpty()}" th:src="${item.briefImg}" th:alt="${item.title}" class="w-full h-full object-cover transition-transform duration-300 hover:scale-105" />
                            <div th:if="${item.briefImg == null || item.briefImg.isEmpty()}" class="w-full h-full flex items-center justify-center bg-blue-50 text-blue-600/70 p-6">
                                <div class="text-center">
                                    <svg class="w-10 h-10 mx-auto stroke-current opacity-70 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                                    <span class="text-xs font-semibold tracking-wider uppercase opacity-80" th:text="${item.tagList != null && !item.tagList.isEmpty() ? item.tagList[0].tag : 'NorthPark'}">课程</span>
                                </div>
                            </div>
                        </div>

                        <div class="p-5 flex-grow flex flex-col justify-between">
                            <div>
                                <h2 class="text-base font-semibold text-gray-900 leading-snug line-clamp-2">
                                    <a th:href="@{'/learning/post-' + ${item.id} + '.html'}" th:text="${item.title}" class="hover:text-blue-600 transition-colors">课程标题</a>
                                </h2>
                                <p th:if="${item.brief != null}" th:text="${item.brief}" class="text-xs text-gray-500 mt-2 line-clamp-2"></p>
                            </div>
                        </div>

                        <div>
                            <div class="px-5 py-2 flex flex-wrap gap-1">
                                <span th:each="tagMap : ${item.tagList}" 
                                      class="text-3xs px-2 py-0.5 bg-gray-50 text-gray-500 rounded-md"
                                      th:text="${tagMap.tag}">标签</span>
                            </div>
                            <div class="px-5 py-3.5 bg-gray-50 border-t border-gray-100 flex items-center justify-between">
                                <span class="text-2xs text-gray-400" th:text="${item.postDate}">2026-03-14</span>
                                <a th:href="@{'/learning/post-' + ${item.id} + '.html'}" class="text-xs font-medium text-blue-600 hover:text-blue-500 flex items-center">
                                    阅读全文 <span class="ml-1">&rarr;</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Pagination -->
                <div class="mt-12 flex justify-center space-x-1" th:if="${totalPages > 1}">
                    <a th:if="${currentPage > 1}" 
                       th:href="@{'/learning/page/' + ${currentPage - 1}(keyword=${keyword}, orderBy=${orderBy})}"
                       class="px-3.5 py-2 rounded-lg bg-white border border-gray-300 text-sm font-medium text-gray-700 hover:bg-gray-50">&larr; 上一页</a>
                    <span class="px-4 py-2 text-sm text-gray-500" th:text="${currentPage} + ' / ' + ${totalPages}">1 / 1</span>
                    <a th:if="${currentPage < totalPages}" 
                       th:href="@{'/learning/page/' + ${currentPage + 1}(keyword=${keyword}, orderBy=${orderBy})}"
                       class="px-3.5 py-2 rounded-lg bg-white border border-gray-300 text-sm font-medium text-gray-700 hover:bg-gray-50">下一页 &rarr;</a>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="lg:col-span-1 space-y-8">
                <!-- Search Box -->
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                    <form action="/learning" method="get">
                        <label for="search" class="block text-sm font-medium text-gray-700 mb-2">搜索课程/图书</label>
                        <div class="flex">
                            <input type="text" id="search" name="keyword" th:value="${keyword}" placeholder="搜索课程..." class="w-full px-4 py-2 rounded-l-xl border border-gray-300 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 text-sm" />
                            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-r-xl text-sm font-medium hover:bg-blue-700">Go</button>
                        </div>
                    </form>
                </div>

                <!-- Tags Sidebar -->
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm" th:if="${learnTags != null}">
                    <h3 class="text-sm font-medium text-gray-900 mb-4 uppercase tracking-wider">热门分类</h3>
                    <div class="flex flex-wrap gap-2">
                        <a th:each="tag : ${learnTags}" 
                           th:href="@{'/learning/tag/' + ${tag.tagCode}}" 
                           class="px-3 py-1 rounded-full text-xs bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors" 
                           th:text="${tag.tag}">标签</a>
                    </div>
                </div>

                <!-- Hot Learning -->
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm" th:if="${learnHotList != null}">
                    <h3 class="text-sm font-medium text-gray-900 mb-4 uppercase tracking-wider">推荐课程</h3>
                    <ul class="space-y-3">
                        <li th:each="hot : ${learnHotList}">
                            <a th:href="@{'/learning/post-' + ${hot.id} + '.html'}" 
                               th:text="${hot.title}" 
                               class="text-sm text-gray-600 hover:text-blue-600 transition-colors line-clamp-1">推荐课程</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="fragments/footer :: footer"></footer>
</body>
</html>
