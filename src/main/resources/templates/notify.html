<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('消息通知中心', null, null)"></head>
<body class="flex flex-col min-h-screen">
    <header th:replace="fragments/nav :: nav"></header>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Page Title -->
        <div class="mb-6 flex flex-col md:flex-row md:items-center md:justify-between">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-gray-900 flex items-center">
                    <svg class="w-6 h-6 mr-2 text-blue-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                    消息通知中心
                </h1>
                <p class="text-sm text-gray-500 mt-1">查看和管理您的文章评论、点赞、树洞回复、新增关注及系统消息。</p>
            </div>
        </div>

        <!-- Filters Section -->
        <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-xs mb-6 flex flex-wrap gap-2 items-center">
            <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider mr-2">消息类型筛选:</span>
            <a href="/notifications" 
               class="px-4 py-1.5 rounded-full text-xs font-medium transition-colors"
               th:classappend="${remindID == null} ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'">
                全部
            </a>
            <a href="/notifications?remindID=1" 
               class="px-4 py-1.5 rounded-full text-xs font-medium transition-colors"
               th:classappend="${remindID == '1'} ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'">
                文章评论
            </a>
            <a href="/notifications?remindID=2" 
               class="px-4 py-1.5 rounded-full text-xs font-medium transition-colors"
               th:classappend="${remindID == '2'} ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'">
                收到点赞
            </a>
            <a href="/notifications?remindID=3" 
               class="px-4 py-1.5 rounded-full text-xs font-medium transition-colors"
               th:classappend="${remindID == '3'} ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'">
                树洞回复
            </a>
            <a href="/notifications?remindID=4" 
               class="px-4 py-1.5 rounded-full text-xs font-medium transition-colors"
               th:classappend="${remindID == '4'} ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'">
                新增关注
            </a>
            <a href="/notifications?remindID=5" 
               class="px-4 py-1.5 rounded-full text-xs font-medium transition-colors"
               th:classappend="${remindID == '5'} ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'">
                站内消息
            </a>
            <a href="/notifications?remindID=6" 
               class="px-4 py-1.5 rounded-full text-xs font-medium transition-colors"
               th:classappend="${remindID == '6'} ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'">
                资源动态
            </a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- Main Content List -->
            <div class="lg:col-span-3">
                <div class="bg-white p-5 rounded-t-2xl border-x border-t border-gray-100 shadow-xs flex justify-between items-center">
                    <h2 class="text-sm font-semibold text-gray-800 flex items-center">
                        <svg class="w-4 h-4 mr-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                        消息列表
                        <span class="text-xs text-gray-400 font-normal ml-2" th:text="'(共 ' + ${list.size()} + ' 条)'">(共 0 条)</span>
                    </h2>
                    <button id="markAllReadBtn" 
                            th:if="${list != null && !list.isEmpty()}"
                            onclick="markAllRead()"
                            class="px-4 py-1.5 bg-blue-600 text-white rounded-full text-xs font-medium hover:bg-blue-700 shadow-sm transition-colors flex items-center ">
                        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        一键已读
                    </button>
                </div>

                <div class="bg-white border border-gray-100 rounded-b-2xl shadow-sm divide-y divide-gray-100">
                    <!-- If empty list -->
                    <div th:if="${list == null || list.isEmpty()}" class="text-center py-12">
                        <svg class="w-12 h-12 mx-auto stroke-current text-gray-300 mb-3" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 010 12.728M16.463 8.288a5.25 5.25 0 010 7.424M6.75 8.25l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 012.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75z" />
                        </svg>
                        <p class="text-sm text-gray-500 font-medium">暂无消息通知</p>
                    </div>
                    
                    <!-- Items -->
                    <div th:each="y : ${list}" class="p-6 transition-colors duration-150 hover:bg-gray-50/50 relative" th:data-id="${y.id}" th:data-status="${y.status}">
                        <!-- Status indicator dot if unread (status == '0') -->
                        <span th:if="${y.status == '0'}" class="absolute left-4 top-1/2 -translate-y-1/2 w-2 h-2 rounded-full bg-red-500 unread-dot"></span>
                        
                        <!-- Inner wrapper -->
                        <div class="flex items-start space-x-4 pl-2">
                            <!-- Avatar / Icon representation -->
                            <div class="flex-shrink-0">
                                <div class="w-10 h-10 rounded-full flex items-center justify-center text-white font-semibold text-sm uppercase"
                                     th:style="'background-color: ' + (${y.remindId == 1} ? '#3498db' : (${y.remindId == 2} ? '#e74c3c' : (${y.remindId == 3} ? '#f1c40f' : (${y.remindId == 4} ? '#2ecc71' : (${y.remindId == 5} ? '#9b59b6' : '#e67e22')))))"
                                     th:text="${#strings.isEmpty(y.senderName) ? 'S' : #strings.substring(y.senderName, 0, 1)}">
                                    S
                                </div>
                            </div>
                            
                            <div class="flex-grow min-w-0">
                                <!-- Header info -->
                                <div class="flex flex-wrap items-center text-sm text-gray-500 gap-1">
                                    <a th:if="${y.senderId != null && y.senderId != '000'}" 
                                       th:href="@{'/cm/channel/' + ${y.senderId}}" 
                                       class="font-semibold text-gray-900 hover:text-blue-600 transition-colors"
                                       th:text="${y.senderName}">发信人</a>
                                    <span th:if="${y.senderId == null || y.senderId == '000'}" 
                                          class="font-semibold text-gray-900"
                                          th:text="${y.senderName}">系统</span>
                                    
                                    <!-- Action description based on remindId -->
                                    <th:block th:switch="${y.remindId}">
                                        <th:block th:case="1">
                                            <span class="text-gray-500">在回复</span>
                                            <a th:href="${y.objectLinks}" class="font-semibold text-blue-600 hover:underline" th:text="${y.object}">对象</a>
                                            <span class="text-gray-500">时提到了你</span>
                                        </th:block>
                                        <th:block th:case="2">
                                            <span class="text-gray-500">赞了你的</span>
                                            <a th:href="${y.objectLinks}" class="font-semibold text-blue-600 hover:underline" th:text="${y.object}">对象</a>
                                        </th:block>
                                        <th:block th:case="3">
                                            <span class="text-gray-500">回复了你的树洞</span>
                                            <a th:href="${y.objectLinks}" class="font-semibold text-blue-600 hover:underline" th:text="${y.object}">对象</a>
                                        </th:block>
                                        <th:block th:case="4">
                                            <span class="text-gray-500">关注了你</span>
                                        </th:block>
                                        <th:block th:case="5">
                                            <span class="text-gray-500">向你发送了系统消息</span>
                                        </th:block>
                                        <th:block th:case="6">
                                            <span class="text-gray-500">通知了资源更新</span>
                                        </th:block>
                                    </th:block>
                                </div>
                                
                                <!-- Message Body -->
                                <div th:if="${y.message != null && !y.message.isEmpty()}" class="mt-2 text-sm text-gray-700 leading-relaxed font-normal bg-gray-50 p-4 rounded-xl prose max-w-none break-all" th:utext="${y.message}">
                                    消息内容
                                </div>
                                
                                <!-- Associated Object for type 6 -->
                                <div th:if="${y.remindId == 6 && y.object != null}" class="mt-2">
                                    <a th:href="${y.objectLinks}" class="inline-flex items-center text-xs font-semibold text-blue-600 hover:underline">
                                        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                                        </svg>
                                        <span th:text="${y.object}">查看链接</span>
                                    </a>
                                </div>
                                
                                <!-- Date -->
                                <div class="mt-3 text-2xs text-gray-400 flex items-center">
                                    <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                                    </svg>
                                    <span th:text="${y.createTime}">时间</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Pagination -->
                <div class="mt-8 flex justify-center space-x-1" th:if="${totalPages > 1}">
                    <a th:if="${currentPage > 1}" 
                       th:href="@{${actionUrl} + '/page/' + ${currentPage - 1}(remindID=${remindID})}" 
                       class="px-3.5 py-2 rounded-lg bg-white border border-gray-300 text-sm font-medium text-gray-700 hover:bg-gray-50">&larr; 上一页</a>
                    <span class="px-4 py-2 text-sm text-gray-500" th:text="${currentPage} + ' / ' + ${totalPages}">1 / 1</span>
                    <a th:if="${currentPage < totalPages}" 
                       th:href="@{${actionUrl} + '/page/' + ${currentPage + 1}(remindID=${remindID})}" 
                       class="px-3.5 py-2 rounded-lg bg-white border border-gray-300 text-sm font-medium text-gray-700 hover:bg-gray-50">下一页 &rarr;</a>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="lg:col-span-1 space-y-6">
                <!-- User Profile Card -->
                <div th:if="${session.user != null}" class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm sticky top-24 space-y-6">
                    <div class="text-center">
                        <div class="w-20 h-20 mx-auto rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold text-2xl uppercase"
                             th:text="${#strings.substring(session.user.username, 0, 1)}">
                            U
                        </div>
                        <h3 class="text-base font-bold text-gray-900 mt-4" th:text="${session.user.username}">用户名</h3>
                        <p class="text-xs text-gray-500 mt-1" th:text="${session.user.email}">邮箱</p>
                    </div>
                    
                    <div class="border-t border-gray-100 pt-4 space-y-3 text-xs text-gray-600">
                        <div class="flex items-center space-x-2">
                            <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                            </svg>
                            <span class="truncate" th:text="'主页: ' + (${session.user.blogSite} ?: '-')">主页</span>
                        </div>
                        <div class="flex items-center space-x-2">
                            <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" />
                            </svg>
                            <span class="truncate" th:text="'签名: ' + (${session.user.meta} ?: '-')">签名</span>
                        </div>
                        <div class="flex items-center space-x-2">
                            <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                            <span th:text="'注册日期: ' + ${session.user.dateJoined}">注册日期</span>
                        </div>
                    </div>
                    
                    <!-- Statistics -->
                    <div class="border-t border-gray-100 pt-4">
                        <h4 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">通知概览</h4>
                        <div class="grid grid-cols-2 gap-4 text-center">
                            <div class="bg-gray-50 p-3 rounded-xl">
                                <div class="text-lg font-bold text-blue-600" th:text="${list.size()}">0</div>
                                <div class="text-3xs text-gray-400 uppercase font-semibold">本页消息</div>
                            </div>
                            <div class="bg-gray-50 p-3 rounded-xl">
                                <div id="sidebarUnreadCount" class="text-lg font-bold text-red-500">0</div>
                                <div class="text-3xs text-gray-400 uppercase font-semibold">未读消息</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="fragments/footer :: footer"></footer>

    <script>
        function markAllRead() {
            var unreadItems = Array.from(document.querySelectorAll('[data-status="0"]'));
            if (unreadItems.length === 0) return;
            
            var ids = unreadItems.map(function(el) { return el.getAttribute('data-id'); }).join(',');
            
            var btn = document.getElementById('markAllReadBtn');
            var originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '处理中...';
            
            var formData = new FormData();
            formData.append('id', ids);
            
            fetch('/notify/readNotify', {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(d => {
                if (d.result) {
                    Swal.fire({
                        title: '成功',
                        text: '标记已读成功！',
                        icon: 'success',
                        timer: 1500,
                        showConfirmButton: false
                    });
                    
                    // Mark items as read in the DOM
                    unreadItems.forEach(function(item) {
                        item.setAttribute('data-status', '1');
                        var dot = item.querySelector('.unread-dot');
                        if (dot) dot.remove();
                    });
                    
                    // Hide the button
                    btn.style.display = 'none';
                    
                    // Update unread count badges
                    var badges = [
                        document.getElementById('nav-notify-count'),
                        document.getElementById('mobile-nav-notify-count'),
                        document.getElementById('sidebarUnreadCount')
                    ];
                    badges.forEach(function(badge) {
                        if(badge) {
                            badge.innerText = '0';
                            badge.classList.add('hidden');
                        }
                    });
                } else {
                    Swal.fire('失败', d.message || '操作失败', 'error');
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            })
            .catch(() => {
                Swal.fire('错误', '网络请求失败，请稍后重试', 'error');
                btn.disabled = false;
                btn.innerHTML = originalText;
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            fetch('/notify/count')
                .then(r => r.json())
                .then(d => {
                    if (d.result) {
                        var sidebarCount = document.getElementById('sidebarUnreadCount');
                        if (sidebarCount) {
                            sidebarCount.innerText = d.data;
                        }
                    }
                });
        });
    </script>
</body>
</html>
