<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('登录', null, null)"></head>
<body class="flex flex-col min-h-screen bg-gray-50">
    <header th:replace="fragments/nav :: nav"></header>

    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-3xl border border-gray-100 shadow-sm">
            <div>
                <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">登录 NorthPark</h2>
                <p class="mt-2 text-center text-sm text-gray-600">
                    或者
                    <a th:href="@{/signup(redirectURI=${redirectURI})}" class="font-medium text-blue-600 hover:text-blue-500">
                        注册一个新账号
                    </a>
                </p>
            </div>
            
            <form class="mt-8 space-y-6" id="loginForm" method="POST">
                <input type="hidden" name="redirectURI" id="redirectURI" th:value="${redirectURI}">
                <div class="rounded-md shadow-sm space-y-4">
                    <div>
                        <label for="email" class="sr-only">邮箱地址</label>
                        <input id="email" name="email" type="email" autocomplete="email" required 
                               class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" 
                               placeholder="邮箱地址">
                    </div>
                    <div>
                        <label for="password" class="sr-only">密码</label>
                        <input id="password" name="password" type="password" autocomplete="current-password" required 
                               class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" 
                               placeholder="密码">
                    </div>
                </div>

                <div class="flex items-center justify-between text-sm">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" 
                               class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                        <label for="remember-me" class="ml-2 block text-gray-900">
                            记住我
                        </label>
                    </div>

                    <div class="text-sm">
                        <a th:href="@{/api/v1/auth/forget}" class="font-medium text-blue-600 hover:text-blue-500">
                            忘记密码？
                        </a>
                    </div>
                </div>

                <div>
                    <button type="button" id="loginBtn" 
                            class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-xl text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                        登录
                    </button>
                </div>

                <div class="relative flex py-2 items-center">
                    <div class="flex-grow border-t border-gray-200"></div>
                    <span class="flex-shrink mx-4 text-gray-400 text-xs">其他登录方式</span>
                    <div class="flex-grow border-t border-gray-200"></div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button type="button" id="githubLogin"
                            class="w-full flex justify-center items-center gap-2 py-3 px-4 border border-gray-200 rounded-xl text-sm font-semibold text-gray-700 bg-white hover:bg-gray-50 transition-colors">
                        <svg class="w-5 h-5 text-gray-900" fill="currentColor" viewBox="0 0 24 24">
                            <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.579.688.481C19.137 20.162 22 16.418 22 12c0-5.523-4.477-10-10-10z" />
                        </svg>
                        GitHub
                    </button>
                    <button type="button" id="googleLogin"
                            class="w-full flex justify-center items-center gap-2 py-3 px-4 border border-gray-200 rounded-xl text-sm font-semibold text-gray-700 bg-white hover:bg-gray-50 transition-colors">
                        <svg class="w-5 h-5 text-red-500" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12.24 10.285V14.4h6.887c-.648 2.41-2.519 4.114-5.136 4.114-3.41 0-6.19-2.78-6.19-6.19 0-3.41 2.78-6.19 6.19-6.19 1.56 0 2.97.58 4.07 1.53l3.07-3.07C19.23 2.19 15.93 1 12.24 1 5.92 1 1 5.92 1 12.24s4.92 11.24 11.24 11.24c6.315 0 11.24-4.925 11.24-11.24 0-.765-.083-1.5-.226-2.2H12.24z"/>
                        </svg>
                        Google
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer th:replace="fragments/footer :: footer"></footer>

    <script th:src="@{https://code.jquery.com/jquery-3.6.0.min.js}"></script>
    <script>
        $(document).ready(function () {
            $("#loginBtn").click(function () {
                var email = $("#email").val();
                var password = $("#password").val();
                var rememberMe = $("#remember-me").is(":checked");
                
                if (!email || !password) {
                    Swal.fire({
                        icon: 'warning',
                        title: '提示',
                        text: '请输入邮箱和密码',
                        confirmButtonText: '确定',
                        buttonsStyling: false,
                        customClass: {
                            confirmButton: 'px-6 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700'
                        }
                    });
                    return;
                }
                
                $.ajax({
                    url: "/api/v1/auth/login",
                    type: "POST",
                    data: {
                        email: email,
                        password: password,
                        "remember-me": rememberMe ? "on" : ""
                    },
                    dataType: "json",
                    success: function (res) {
                        if (res.result) {
                            var redirect = $("#redirectURI").val();
                            window.location.href = redirect ? redirect : "/";
                        } else {
                            Swal.fire({
                                icon: 'error',
                                title: '登录失败',
                                text: res.message,
                                confirmButtonText: '确定',
                                buttonsStyling: false,
                                customClass: {
                                    confirmButton: 'px-6 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700'
                                }
                            });
                        }
                    },
                    error: function () {
                        Swal.fire({
                            icon: 'error',
                            title: '错误',
                            text: '网络异常，请重试',
                            confirmButtonText: '确定',
                            buttonsStyling: false,
                            customClass: {
                                confirmButton: 'px-6 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700'
                            }
                        });
                    }
                });
            });

            $(document).keydown(function (event) {
                if (event.keyCode == 13) {
                    $("#loginBtn").click();
                }
            });

            // 第三方登录处理
            $('#githubLogin').click(function() {
                var redirectURI = $("#redirectURI").val();
                window.location.href = '/auth/github?redirectURI=' + encodeURIComponent(redirectURI || "/");
            });

            $('#googleLogin').click(function() {
                var redirectURI = $("#redirectURI").val();
                window.location.href = '/auth/google?redirectURI=' + encodeURIComponent(redirectURI || "/");
            });
        });
    </script>
</body>
</html>
