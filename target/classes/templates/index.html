<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('首页', null, null)"></head>
<body class="flex flex-col min-h-screen bg-gray-50">
    <header th:replace="fragments/nav :: nav"></header>

    <!-- Hero Section -->
    <main class="flex-grow">
        <div class="relative overflow-hidden bg-white border-b border-gray-100">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-24 md:py-32">
                <div class="text-center max-w-3xl mx-auto space-y-6">
                    <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight text-gray-900 leading-none">
                        探索 <span class="text-blue-600">NorthPark</span> 的精彩世界
                    </h1>
                    <p class="text-lg md:text-xl text-gray-500 leading-relaxed">
                        一个极简、现代化的影视资源、效率软件和优质课程聚合社区。体验如丝般顺滑的纯净浏览。
                    </p>
                    <div class="flex flex-wrap justify-center gap-4 pt-4">
                        <a href="/movies" class="px-8 py-3.5 bg-blue-600 text-white rounded-2xl text-sm font-semibold hover:bg-blue-700 shadow-lg shadow-blue-500/20 transition-all duration-300">
                            浏览影视
                        </a>
                        <a href="/signup" class="px-8 py-3.5 bg-gray-950 text-white rounded-2xl text-sm font-semibold hover:bg-gray-800 transition-all duration-300">
                            立即加入
                        </a>
                    </div>
                </div>
            </div>
            
            <!-- Abstract background shape -->
            <div class="absolute top-0 right-0 -z-10 translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] rounded-full bg-blue-50/50 blur-3xl"></div>
            <div class="absolute bottom-0 left-0 -z-10 -translate-x-1/2 translate-y-1/2 w-[600px] h-[600px] rounded-full bg-indigo-50/50 blur-3xl"></div>
        </div>

        <!-- Features Grid -->
        <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <!-- Card 1 -->
                <div class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm hover:shadow-md transition-all duration-300 space-y-4">
                    <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"></path>
                        </svg>
                    </div>
                    <h3 class="text-xl font-bold text-gray-900">影视窝</h3>
                    <p class="text-sm text-gray-500 leading-relaxed">
                        精选全球优质电影与电视剧资源，每日更新，支持按最新、最热及热门标签多维度筛选。
                    </p>
                    <a href="/movies" class="inline-flex items-center text-sm font-semibold text-blue-600 hover:text-blue-500 pt-2">
                        去看看 <span class="ml-1">&rarr;</span>
                    </a>
                </div>

                <!-- Card 2 -->
                <div class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm hover:shadow-md transition-all duration-300 space-y-4">
                    <div class="w-12 h-12 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.813 15.904L9 21l8.913-6.204M14.35 9.05L11 8l2.913-6.204M17.65 14.95L21 16l-2.913 6.204M12 12V4M12 12l-3-3M12 12l3-3"></path>
                        </svg>
                    </div>
                    <h3 class="text-xl font-bold text-gray-900">精品软件</h3>
                    <p class="text-sm text-gray-500 leading-relaxed">
                        汇聚各种开发工具、效率神器及极客应用，提供安全可靠的官方原版或绿色版下载。
                    </p>
                    <a href="/softs" class="inline-flex items-center text-sm font-semibold text-indigo-600 hover:text-indigo-500 pt-2">
                        去看看 <span class="ml-1">&rarr;</span>
                    </a>
                </div>

                <!-- Card 3 -->
                <div class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm hover:shadow-md transition-all duration-300 space-y-4">
                    <div class="w-12 h-12 bg-green-50 rounded-2xl flex items-center justify-center text-green-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                        </svg>
                    </div>
                    <h3 class="text-xl font-bold text-gray-900">学习资源</h3>
                    <p class="text-sm text-gray-500 leading-relaxed">
                        共享前沿互联网技术、设计创意及语言学习视频，帮助每位社区成员快速提升核心竞争力。
                    </p>
                    <a href="/courses" class="inline-flex items-center text-sm font-semibold text-green-600 hover:text-green-500 pt-2">
                        去看看 <span class="ml-1">&rarr;</span>
                    </a>
                </div>
            </div>
        </section>

                </div>

        </section> -->
