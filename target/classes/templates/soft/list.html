<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('软件列表', null, null)"></head>
<body class="flex flex-col min-h-screen">
    <header th:replace="fragments/nav :: nav"></header>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- Main Content List -->
            <div class="lg:col-span-3">
                <div class="mb-6 flex justify-between items-center">
                    <h1 class="text-2xl font-bold tracking-tight text-gray-900">
                        <span th:if="${selTag != null}" th:text="'标签: ' + ${selTag}">标签检索</span>
                        <span th:if="${selMonth != null}" th:text="'月份归档: ' + ${selMonth}">月份检索</span>
                        <span th:if="${selTag == null && selMonth == null}">软件下载</span>
                    </h1>
                </div>

                <!-- Grid List -->
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                    <div th:each="item : ${list}" class="bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm hover:shadow-md transition-all duration-300 flex flex-col justify-between">
                <!-- Software Icon / Image -->
                <div class="relative aspect-video w-full bg-gray-50 overflow-hidden border-b border-gray-50 flex items-center justify-center">
                    <div th:if="${item.briefImg != null && !item.briefImg.isEmpty()}" class="w-full h-full flex items-center justify-center p-4">
                        <img th:src="${item.briefImg}" th:alt="${item.title}" class="max-w-[120px] max-h-[120px] object-contain rounded-lg transition-transform duration-300 hover:scale-105" />
                    </div>
                    <div th:if="${item.briefImg == null || item.briefImg.isEmpty()}" class="w-full h-full flex items-center justify-center text-gray-400 bg-gray-100">
                        <div class="w-12 h-12 rounded-xl bg-blue-50 flex items-center justify-center text-blue-600 font-bold text-xl">
                            <span th:text="${#strings.substring(item.title, 0, 1)}">S</span>
                        </div>
                    </div>
                    <span class="absolute top-3 left-3 px-2.5 py-0.5 rounded-md text-2xs font-semibold bg-gray-900/80 text-white uppercase tracking-wide backdrop-blur-xs" th:text="${item.os} ?: 'Mac/Win'">OS</span>
                </div>
                
                <div class="p-6 flex-grow flex flex-col justify-between">
                    <div>
                        <h2 class="text-base font-semibold text-gray-900 leading-snug line-clamp-2">
                            <a th:href="@{'/soft/' + ${item.retCode} + '.html'}" th:text="${item.title}" class="hover:text-blue-600 transition-colors">软件名称</a>
                        </h2>
                        <p th:if="${item.briefShow != null}" th:text="${item.briefShow}" class="text-xs text-gray-500 mt-2 line-clamp-3"></p>
                        <p th:if="${item.briefShow == null && item.brief != null}" th:text="${item.brief}" class="text-xs text-gray-500 mt-2 line-clamp-3"></p>
                    </div>
                </div>
                        
                        <div>
                            <div class="px-6 py-2 flex flex-wrap gap-1">
                                <span th:each="tagMap : ${item.tagList}" 
                                      class="text-3xs px-2 py-0.5 bg-gray-50 text-gray-500 rounded-md"
                                      th:text="${tagMap.tag}">标签</span>
                            </div>
                            <div class="px-6 py-3.5 bg-gray-50 border-t border-gray-100 flex items-center justify-between">
                                <span class="text-2xs text-gray-400" th:text="${item.postDate}">2026-03-14</span>
                                <a th:href="@{'/soft/' + ${item.retCode} + '.html'}" class="text-xs font-medium text-blue-600 hover:text-blue-500 flex items-center">
                                    去下载 <span class="ml-1">&rarr;</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Pagination -->
                <div class="mt-12 flex justify-center space-x-1" th:if="${totalPages > 1}">
                    <a th:if="${currentPage > 1}" 
                       th:href="@{'/soft/mac/page/' + ${currentPage - 1}(keyword=${keyword})}" 
                       class="px-3.5 py-2 rounded-lg bg-white border border-gray-300 text-sm font-medium text-gray-700 hover:bg-gray-50">&larr; 上一页</a>
                    <span class="px-4 py-2 text-sm text-gray-500" th:text="${currentPage} + ' / ' + ${totalPages}">1 / 1</span>
                    <a th:if="${currentPage < totalPages}" 
                       th:href="@{'/soft/mac/page/' + ${currentPage + 1}(keyword=${keyword})}" 
                       class="px-3.5 py-2 rounded-lg bg-white border border-gray-300 text-sm font-medium text-gray-700 hover:bg-gray-50">下一页 &rarr;</a>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="lg:col-span-1 space-y-8">
                <!-- Search Box -->
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                    <form action="/soft/mac" method="get">
                        <label for="search" class="block text-sm font-medium text-gray-700 mb-2">搜索软件</label>
                        <div class="flex">
                            <input type="text" id="search" name="keyword" th:value="${keyword}" placeholder="搜索Mac, Win软件..." class="w-full px-4 py-2 rounded-l-xl border border-gray-300 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 text-sm" />
                            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-r-xl text-sm font-medium hover:bg-blue-700">Go</button>
                        </div>
                    </form>
                </div>

                <!-- Month Archives -->
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm" th:if="${monthList != null}">
                    <h3 class="text-sm font-medium text-gray-900 mb-4 uppercase tracking-wider">归档月份</h3>
                    <div class="grid grid-cols-2 gap-2 text-xs">
                        <a th:each="m : ${monthList}" 
                           th:href="@{'/soft/month/' + ${m}}" 
                           class="px-2 py-1 rounded bg-gray-50 text-gray-600 hover:bg-blue-50 hover:text-blue-600 text-center transition-colors"
                           th:text="${m}">2026-03</a>
                    </div>
                </div>

                <!-- Tags Sidebar -->
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm" th:if="${softTags != null}">
                    <h3 class="text-sm font-medium text-gray-900 mb-4 uppercase tracking-wider">软件标签</h3>
                    <div class="flex flex-wrap gap-2">
                        <a th:each="tag : ${softTags}" 
                           th:href="@{'/soft/tag/' + ${tag.tagCode}}" 
                           class="px-3 py-1 rounded-full text-xs bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors" 
                           th:text="${tag.tag}">标签</a>
                    </div>
                </div>

                <!-- Hot Software -->
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm" th:if="${softHotList != null}">
                    <h3 class="text-sm font-medium text-gray-900 mb-4 uppercase tracking-wider">热门推荐</h3>
                    <ul class="space-y-3">
                        <li th:each="hot : ${softHotList}">
                            <a th:href="@{'/soft/' + ${hot.retCode} + '.html'}" 
                               th:text="${hot.title}" 
                               class="text-sm text-gray-600 hover:text-blue-600 transition-colors line-clamp-1">热门软件</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="fragments/footer :: footer"></footer>
</body>
</html>
